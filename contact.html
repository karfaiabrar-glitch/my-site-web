<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Contact us at the victorian Hotel, Miami. Always open, enjoy your stay.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="keywords" content="contact, the victorian, Miami, hotel, inquiry">
  <title>the victorian | Contact Us</title>
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://thevictorian.com/contact">

  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    
    :root {
      --dark: #013220;
      --mid: #026440;
      --light: #32c48d;
      --bg: #014d30;
      --text-light: #ffffffde;
    }

    body {
      background: var(--bg);
      color: var(--text-light);
      font-weight: bold;
    }

    .navbar {
      background: linear-gradient(90deg, var(--dark), var(--mid));
      font-weight: bold;
    }

    .navbar-brand, .nav-link {
      color: var(--text-light) !important;
      font-weight: bold;
    }

    .nav-link:hover {
      color: var(--light) !important;
    }

    header.hero {
      background: linear-gradient(to bottom, var(--mid), var(--dark));
      color: var(--text-light);
      font-weight: bold;
      border-radius: 12px;
      padding: 40px;
      margin: 20px auto;
      text-align: center;
    }

    header.hero h1 {
      color: var(--light);
      font-weight: bold;
    }

    form {
      background: var(--mid);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(1,50,32,0.5);
      color: var(--text-light);
      font-weight: bold;
    }

    .form-label {
      font-weight: bold;
      color: var(--light);
    }

    .btn-submit {
      background: var(--light);
      color: var(--dark);
      font-weight: bold;
    }

    .btn-submit:hover {
      background: var(--text-light);
      color: var(--mid);
    }

    footer {
      background: var(--dark);
      color: var(--text-light);
      font-weight: bold;
      text-align: center;
      padding: 20px;
    }

    footer::after {
      content: "";
      display: block;
      height: 5px;
      background: linear-gradient(to right, var(--mid), var(--light));
    }

    .navbar-dark .navbar-toggler-icon {
      filter: brightness(1.8);
    }

    @media(max-width:600px) {
      header.hero h1 { font-size:1.6rem; }
      form { padding:15px; }
    }

    @media(min-width:601px) and (max-width:992px) {
      header.hero h1 { font-size:2rem; }
    }

    @media(min-width:993px) {
      header.hero h1 { font-size:2.4rem; }
    }
  </style>
</head>
<body>

  <header class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">the victorian</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="chambres.html">Rooms</a></li>
          <li class="nav-item"><a class="nav-link" href="buffet.html">Buffet</a></li>
          <li class="nav-item"><a class="nav-link" href="prices.html">Prices</a></li>
        </ul>
      </div>
    </div>
  </header>

  <header class="hero">
    <h1>Contact Us</h1>
    <p>We’d love to hear from you. Fill out the form below and we’ll get back to you soon.</p>
  </header>

  <section class="container my-5">
    <form>
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" id="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="phone" class="form-label">Telephone</label>
        <input type="tel" id="phone" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="message" class="form-label">Message</label>
        <textarea id="message" class="form-control" rows="5" required></textarea>
      </div>
      <button type="submit" class="btn btn-submit w-100">Send Message</button>
    </form>
  </section>

  <footer>
    <p> the victorian Hotel, Miami, Florida, USA |  +1 305 555‑1234 |  info@thevictorian.com</p>
    <p>© 2025 the victorian Miami | All Rights Reserved</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
